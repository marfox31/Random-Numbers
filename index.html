<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Numbers</title>
</head>
<body>
    <h1> Random Number Generator </h1>
    <button onclick="generateRandomNumber()">Generate Random Number</button>
    
    <p id="random-number"></p>
    <p id="coin">Coin Result will be displayed here.</p>

    <script>
        function generateRandomNumber() {
            // 1. Generate the number
            let randomNumber = Math.random();
            
            // 2. Decide Heads or Tails
            let coinResult = (randomNumber < 0.5) ? "Heads" : "Tails";

            // 3. Update the HTML elements
            document.getElementById("random-number").textContent = "Random Number Generated: " + randomNumber.toFixed(4);
            document.getElementById("coin").textContent = "Result: " + coinResult;
        }
    </script>
</body>
</html>

<body>
   <body>
    <H1> Random Number Generator </H1>
    <button onclick="generateRandomNumber()">Generate Random Number</button>
    <p id="random-number"></p>
    <p id="coin"></p>
    <script>
        const randomParagraph = document.createElement("p");
        randomParagraph.textContent = "coin Result will be displayed here."
        randomParagraph.

        function generateRandomNumber() {
            randomNumber = Math.random();
            document.getElementById("random-number").innerHTML = "Random Number Generated: " + randomNumber;

            if (randomNumber<0.5){
                coin = "Heads";
            }
                else { 
                coin="Tails";
            }


            // const randomNumber = Math.floor(Math.random() * 100) + 1; // Generates a random number between 1 and 100

        }
       
    </script>
